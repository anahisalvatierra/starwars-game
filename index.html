<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Star Wars - X-Wing vs Tie Fighter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>


function crearGraficoEspacio() {
  const c = document.createElement('canvas');
  c.width = 800; c.height = 600;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#020210'; ctx.fillRect(0,0,800,600);
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 120; i++) {
    const s = Math.random() * 2 + 0.5;
    ctx.fillRect(Math.random()*800, Math.random()*600, s, s);
  }
  
  const g = ctx.createRadialGradient(600,150,0,600,150,180);
  g.addColorStop(0, 'rgba(80,0,160,0.18)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,800,600);
  return c;
}

function crearGraficoXWing8bit() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  
  const pixels = [
    '00000100',
    '00001100',
    '11111110',
    '11111111',
    '11111111',
    '11111110',
    '00001100',
    '00000100',
  ];
  const pal = { '0': null, '1': '#dcdcdc', '2': '#ff4500', '3': '#00e5ff', '4': '#ff0000' };
  const map8 = [
    '00010000','00011000','11111100','01111110',
    '01111110','11111100','00011000','00010000'
  ];
  
  const body = [
    [0,'00000100'],[0,'00001100'],[0,'11111110'],[0,'11111111'],
    [0,'11111111'],[0,'11111110'],[0,'00001100'],[0,'00000100'],
  ];
  body.forEach(([_,row], ry) => {
    [...row].forEach((px, rx) => {
      if (px === '1') {
        ctx.fillStyle = rx === 3 ? '#ff4500' : '#dcdcdc';
        ctx.fillRect(rx*8, ry*8, 8, 8);
      }
    });
  });
  
  ctx.fillStyle = '#00e5ff'; ctx.fillRect(24,24,16,16);
 
  ctx.fillStyle = '#ff8800'; ctx.fillRect(0,24,8,8); ctx.fillRect(56,24,8,8);
  return c;
}

function crearGraficoTie8bit() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,8,16,48); ctx.fillRect(48,8,16,48);
 
  ctx.fillStyle = '#16213e';
  for (let i=0;i<6;i++) { ctx.fillRect(2,8+i*8,12,1); ctx.fillRect(50,8+i*8,12,1); }
  
  ctx.fillStyle = '#4a5568'; ctx.fillRect(16,28,32,8);
  
  ctx.fillStyle = '#718096';
  ctx.beginPath(); ctx.arc(32,32,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00ff41';
  ctx.beginPath(); ctx.arc(32,32,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#003300';
  ctx.beginPath(); ctx.arc(32,32,3,0,Math.PI*2); ctx.fill();
  return c;
}

function crearGraficoLaser(color) {
  const c = document.createElement('canvas');
  c.width = 6; c.height = 20;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,20);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(0.5, color);
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,6,20);
  return c;
}

function crearGraficoExplosion(frame) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const colors = ['#ff0000','#ff4500','#ff8800','#ffcc00','#ffffff'];
  const radii  = [30,24,18,12,6];
  const r = radii[frame] || 6;
  const col = colors[frame] || '#ffffff';
  const g = ctx.createRadialGradient(32,32,0,32,32,r);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.4, col);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(32,32,r,0,Math.PI*2); ctx.fill();
  return c;
}

function crearGraficoEstrellaMuerte() {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  
  const g = ctx.createRadialGradient(48,42,0,64,64,62);
  g.addColorStop(0,'#aaaaaa'); g.addColorStop(0.6,'#666666'); g.addColorStop(1,'#222222');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(64,64,62,0,Math.PI*2); ctx.fill();
  
  ctx.strokeStyle='#888'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(2,64); ctx.lineTo(126,64); ctx.stroke();
 
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(40,40,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(40,40,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00ff88';
  ctx.beginPath(); ctx.arc(40,40,7,0,Math.PI*2); ctx.fill();
  
  ctx.strokeStyle='#555'; ctx.lineWidth=1;
  for (let i=0;i<8;i++) {
    ctx.beginPath();
    ctx.moveTo(64+Math.cos(i*0.8)*10,64+Math.sin(i*0.8)*10);
    ctx.lineTo(64+Math.cos(i*0.8)*55,64+Math.sin(i*0.8)*55);
    ctx.stroke();
  }
  return c;
}

function crearGraficoBarraVida(w,h,pct,color) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#222'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle=color; ctx.fillRect(2,2,Math.max(0,(w-4)*pct),h-4);
  ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);
  return c;
}

class MenuScene extends Phaser.Scene {
  constructor() { super('MenuScene'); }

  preload() {
    this.textures.addCanvas('espacio',    crearGraficoEspacio());
    this.textures.addCanvas('xwing',      crearGraficoXWing8bit());
    this.textures.addCanvas('tie',        crearGraficoTie8bit());
    this.textures.addCanvas('laser1',     crearGraficoLaser('#00e5ff'));
    this.textures.addCanvas('laser2',     crearGraficoLaser('#ff4500'));
    this.textures.addCanvas('deathstar',  crearGraficoEstrellaMuerte());
    for (let i=0;i<5;i++)
      this.textures.addCanvas('exp'+i, crearGraficoExplosion(i));
  }

  create() {
    this.add.image(400,300,'espacio');

   
    const titulo = this.add.text(400,100,'STAR WARS', {
      fontSize:'64px', fill:'#FFE81F', fontFamily:'Courier New', fontStyle:'bold',
      stroke:'#a08000', strokeThickness:6
    }).setOrigin(0.5);
    this.tweens.add({ targets:titulo, scaleX:1.05, scaleY:1.05, duration:900, yoyo:true, repeat:-1 });

    this.add.text(400,175,'X-Wing vs Tie Fighter', {
      fontSize:'22px', fill:'#ffffff', fontFamily:'Courier New'
    }).setOrigin(0.5);

   
    const xw = this.add.image(240,290,'xwing').setScale(2);
    const ti = this.add.image(560,290,'tie').setScale(2);
    this.tweens.add({ targets:xw, y:280, duration:1200, yoyo:true, repeat:-1 });
    this.tweens.add({ targets:ti, y:300, duration:1400, yoyo:true, repeat:-1 });

    
    this.add.image(400,310,'deathstar').setScale(0.55).setAlpha(0.6);

    
    const opciones = [
      '[ ENTER ] — 1 Jugador',
      '[ P ]     — 2 Jugadores',
      '',
      'Jugador 1:  ← ↑ ↓ →   |  Z = disparar',
      'Jugador 2:  W A S D    |  ESPACIO = disparar',
    ];
    opciones.forEach((t,i) => {
      this.add.text(400, 400+i*24, t, {
        fontSize:'15px', fill: i<2?'#FFE81F':'#aaaaaa', fontFamily:'Courier New'
      }).setOrigin(0.5);
    });

    const parpadeo = this.add.text(400,556,'Presiona ENTER o P para comenzar', {
      fontSize:'14px', fill:'#888888', fontFamily:'Courier New'
    }).setOrigin(0.5);
    this.tweens.add({ targets:parpadeo, alpha:0, duration:500, yoyo:true, repeat:-1 });

    this.input.keyboard.on('keydown-ENTER', ()=> this.scene.start('GameScene',{players:1}));
    this.input.keyboard.on('keydown-P',     ()=> this.scene.start('GameScene',{players:2}));
  }
}


class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.numJugadores = data.players || 1;
    this.puntuacion   = 0;
    this.juegoTerminado = false;
    this.deathStarHP  = 5;          
    this.tiempoLimite = 60000;      
  }

  create() {
   
    this.fondo = this.add.tileSprite(400,300,800,600,'espacio');

    
    this.deathStar = this.physics.add.image(1000,300,'deathstar').setScale(0.6);
    this.deathStar.setVelocityX(-40);
    this.deathStar.setImmovable(true);

    
    this.p1 = this.physics.add.sprite(150,300,'xwing').setScale(1.6);
    this.p1.setCollideWorldBounds(true);
    this.p1.hp = 3; this.p1.maxHp = 3;
    this.p1.lastShot = 0;

    
    if (this.numJugadores === 2) {
      this.p2 = this.physics.add.sprite(650,300,'tie').setScale(1.6);
      this.p2.setCollideWorldBounds(true);
      this.p2.hp = 3; this.p2.maxHp = 3;
      this.p2.lastShot = 0;
      this.teclasP2 = this.input.keyboard.addKeys({ up:'W', down:'S', left:'A', right:'D', fire:'SPACE' });
    }

   
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.fireP1   = this.input.keyboard.addKey('Z');

   
    this.lasersP1  = this.physics.add.group();
    this.lasersP2  = this.physics.add.group();
    this.enemigos  = this.physics.add.group();
    this.explosiones = this.add.group();

   
    this.time.addEvent({ delay:2000, callback:this.spawnEnemigo, callbackScope:this, loop:true });

    
    this.txtScore  = this.add.text(16,16,'Puntos: 0',{ fontSize:'18px', fill:'#fff', fontFamily:'Courier New' });
    this.txtTimer  = this.add.text(400,16,'60s',{ fontSize:'18px', fill:'#FFE81F', fontFamily:'Courier New' }).setOrigin(0.5,0);
    this.txtDSHP   = this.add.text(650,16,'Estrella ★★★★★',{ fontSize:'14px', fill:'#ff4444', fontFamily:'Courier New' });

    
    this.sprHP1 = this.add.image(90,580,'espacio').setAlpha(0); // placeholder
    this.add.text(16,568,'P1',{ fontSize:'13px', fill:'#00e5ff', fontFamily:'Courier New' });
    if (this.numJugadores===2) {
      this.add.text(600,568,'P2',{ fontSize:'13px', fill:'#ff4500', fontFamily:'Courier New' });
    }
    this.actualizarBarrasHP();

    
    this.physics.add.overlap(this.lasersP1, this.enemigos,   this.laserHitEnemigo,  null, this);
    this.physics.add.overlap(this.lasersP1, this.deathStar,  this.laserHitDeathStar,null, this);
    this.physics.add.overlap(this.enemigos, this.p1,         this.enemigoHitJugador,null, this);

    if (this.numJugadores===2) {
      this.physics.add.overlap(this.lasersP2, this.enemigos,  this.laserHitEnemigo,  null, this);
      this.physics.add.overlap(this.lasersP2, this.deathStar, this.laserHitDeathStar,null, this);
      this.physics.add.overlap(this.enemigos, this.p2,        this.enemigoHitJugador,null, this);
    }

    
    this.tiempoRestante = 60;
    this.time.addEvent({ delay:1000, callback:()=>{
      if (this.juegoTerminado) return;
      this.tiempoRestante--;
      this.txtTimer.setText(this.tiempoRestante+'s');
      if (this.tiempoRestante <= 10) this.txtTimer.setFill('#ff4444');
      if (this.tiempoRestante <= 0) this.terminarJuego('pierde','¡El Imperio ganó!\nLa Estrella de la Muerte llegó');
    }, callbackScope:this, loop:true });
  }

  update(time) {
    if (this.juegoTerminado) return;

   
    this.fondo.tilePositionX += 2;

   
    this.p1.setVelocity(0);
    if (this.cursors.left.isDown)  this.p1.setVelocityX(-280);
    if (this.cursors.right.isDown) this.p1.setVelocityX(280);
    if (this.cursors.up.isDown)    this.p1.setVelocityY(-280);
    if (this.cursors.down.isDown)  this.p1.setVelocityY(280);

    // Disparo P1 (cadencia limitada)
    if (this.fireP1.isDown && time - this.p1.lastShot > 300) {
      this.disparar(this.p1, this.lasersP1, 'laser1', 500);
      this.p1.lastShot = time;
    }

    
    if (this.numJugadores===2 && this.p2 && this.p2.active) {
      this.p2.setVelocity(0);
      if (this.teclasP2.left.isDown)  this.p2.setVelocityX(-280);
      if (this.teclasP2.right.isDown) this.p2.setVelocityX(280);
      if (this.teclasP2.up.isDown)    this.p2.setVelocityY(-280);
      if (this.teclasP2.down.isDown)  this.p2.setVelocityY(280);

      if (this.teclasP2.fire.isDown && time - this.p2.lastShot > 300) {
        this.disparar(this.p2, this.lasersP2, 'laser2', -500);
        this.p2.lastShot = time;
      }
    }

   
    [this.lasersP1, this.lasersP2].forEach(grupo => {
      grupo.children.iterate(l => { if(l && (l.x>820||l.x<-20)) l.destroy(); });
    });

    
    this.enemigos.children.iterate(e => { if(e && e.x < -60) e.destroy(); });

    
    if (this.deathStar.x < 200) {
      this.terminarJuego('pierde','¡El Imperio ganó!\nLa Estrella de la Muerte llegó');
    }
  }

  
  spawnEnemigo() {
    if (this.juegoTerminado) return;
    const y = Phaser.Math.Between(60, 540);
    const e = this.enemigos.create(820, y, 'tie').setScale(1.4);
    e.setVelocityX(Phaser.Math.Between(-180,-100));
    e.hp = 1;
  }

  
  disparar(jugador, grupo, textura, velX) {
    const laser = grupo.create(jugador.x + (velX>0?30:-30), jugador.y, textura);
    laser.setVelocityX(velX);
    laser.setScale(1.2);
    
    this.sonidoLaser();
  }

  
  laserHitEnemigo(laser, enemigo) {
    laser.destroy();
    enemigo.hp--;
    if (enemigo.hp <= 0) {
      this.crearExplosion(enemigo.x, enemigo.y);
      enemigo.destroy();
      this.puntuacion += 100;
      this.txtScore.setText('Puntos: '+this.puntuacion);
    }
  }

 
  laserHitDeathStar(laser, ds) {
    laser.destroy();
    this.deathStarHP--;
    // actualizar texto indicador
    const estrellas = '★'.repeat(this.deathStarHP) + '☆'.repeat(5-this.deathStarHP);
    this.txtDSHP.setText('Estrella '+estrellas);
    this.cameras.main.shake(120,0.008);
    if (this.deathStarHP <= 0) {
      this.crearExplosion(ds.x, ds.y, 3);
      ds.destroy();
      this.puntuacion += 1000;
      this.terminarJuego('gana','¡Que la Fuerza te acompañe!\nDestruyeron la Estrella de la Muerte');
    }
  }

 
  enemigoHitJugador(enemigo, jugador) {
    this.crearExplosion(enemigo.x, enemigo.y);
    enemigo.destroy();
    jugador.hp--;
    this.actualizarBarrasHP();
    this.cameras.main.shake(200,0.015);
    // Parpadeo del jugador afectado
    this.tweens.add({ targets:jugador, alpha:0, duration:80, yoyo:true, repeat:5 });
    if (jugador.hp <= 0) {
      jugador.destroy();
      // Si ambos mueren (o solo hay P1) → fin
      const p1muerto = !this.p1 || !this.p1.active;
      const p2muerto = this.numJugadores<2 || !this.p2 || !this.p2.active;
      if (p1muerto && p2muerto)
        this.terminarJuego('pierde','¡El Imperio venció!\nAmbas naves destruidas');
    }
  }


  crearExplosion(x, y, escala=1.5) {
    let frame = 0;
    const img = this.add.image(x,y,'exp0').setScale(escala);
    const timer = this.time.addEvent({ delay:60, callback:()=>{
      frame++;
      if (frame >= 5) { img.destroy(); timer.destroy(); return; }
      img.setTexture('exp'+frame);
    }, loop:true });
    this.sonidoExplosion();
  }

  
  actualizarBarrasHP() {
    const W=120, H=14;
    // P1
    const pct1 = this.p1 ? this.p1.hp/this.p1.maxHp : 0;
    const col1  = pct1>0.5?'#00ff88':(pct1>0.25?'#ffaa00':'#ff2200');
    const key1  = 'hp1_'+Date.now();
    this.textures.addCanvas(key1, crearGraficoBarraVida(W,H,pct1,col1));
    if (this.barHP1) this.barHP1.destroy();
    this.barHP1 = this.add.image(30+W/2, 575, key1);

    if (this.numJugadores===2) {
      const pct2 = this.p2 && this.p2.active ? this.p2.hp/this.p2.maxHp : 0;
      const col2  = pct2>0.5?'#ff6600':(pct2>0.25?'#ffaa00':'#ff2200');
      const key2  = 'hp2_'+Date.now();
      this.textures.addCanvas(key2, crearGraficoBarraVida(W,H,pct2,col2));
      if (this.barHP2) this.barHP2.destroy();
      this.barHP2 = this.add.image(620, 575, key2);
    }
  }

  
  sonidoLaser() {
    try {
      const ac = new (window.AudioContext||window.webkitAudioContext)();
      const o  = ac.createOscillator();
      const g  = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(1200,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(300,ac.currentTime+0.1);
      g.gain.setValueAtTime(0.15,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
      o.start(); o.stop(ac.currentTime+0.1);
    } catch(e){}
  }

  sonidoExplosion() {
    try {
      const ac = new (window.AudioContext||window.webkitAudioContext)();
      const buf = ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.5);
      const src = ac.createBufferSource();
      const g   = ac.createGain();
      src.buffer=buf; src.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.4,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
      src.start();
    } catch(e){}
  }

  
  terminarJuego(resultado, mensaje) {
    if (this.juegoTerminado) return;
    this.juegoTerminado = true;
    this.physics.pause();

    const color = resultado==='gana' ? '#FFE81F' : '#ff4444';
    const bg = this.add.rectangle(400,300,600,220,0x000000,0.78).setDepth(10);
    this.add.text(400,240, mensaje, {
      fontSize:'26px', fill:color, fontFamily:'Courier New',
      align:'center', wordWrap:{width:560}
    }).setOrigin(0.5).setDepth(11);
    this.add.text(400,330,'Puntuación final: '+this.puntuacion, {
      fontSize:'20px', fill:'#ffffff', fontFamily:'Courier New'
    }).setOrigin(0.5).setDepth(11);
    this.add.text(400,375,'[ ENTER ] Menú  |  [ R ] Reintentar', {
      fontSize:'15px', fill:'#aaaaaa', fontFamily:'Courier New'
    }).setOrigin(0.5).setDepth(11);

    this.input.keyboard.once('keydown-ENTER',()=> this.scene.start('MenuScene'));
    this.input.keyboard.once('keydown-R',    ()=> this.scene.restart({players:this.numJugadores}));
  }
}


const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: '#020210',
  physics: { default:'arcade', arcade:{ gravity:{y:0}, debug:false } },
  scene: [ MenuScene, GameScene ]
};

new Phaser.Game(config);
</script>
</body>
</html>
